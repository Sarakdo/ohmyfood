<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <script src="https://kit.fontawesome.com/784227ea34.js" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Shrikhand&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Oh My Food</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="header">
        <img class="header__logo" src="images/logo/ohmyfood@2x.svg">
    </header>
    <main>
        <section class="location">
                <i class="fa-solid fa-location-dot"></i>
                <div class="local__text">Paris, Belleville</div>
        </section>

        <section class="explo">
            <h2 class="explo__title">Réservez le menu qui vous convient</h2>
            <p class="explo__subt">Découvrez des restaurants d'exception, sélectionnés par nos soins.</p>
            <button> Explorer nos restaurants</button>
        </section>

        <section class="fonct">
            <div class="container">
                <h2 class="fonct__title">Fonctionnement</h2>
                <ol class="fonct__steps">

                    <li class="fonct__step">
                        <i class="fa-solid fa-mobile-screen-button"></i>
                        <span class="fonct__title">Choisissez un restaurant</span>
                    </li>

                    <li class="fonct__step">
                        <i class="fa-solid fa-list-ul"></i>
                        <span class="fonct__title">Composez votre menu</span>
                    </li>
                    
                    <li class="fonct__step">
                        <i class="fa-solid fa-store"></i>
                        <span class="fonct__title">Dégustez au restaurant</span>
                    </li>

                </ol>
            </div>
        </section>

    </main>
</body>
</html>
